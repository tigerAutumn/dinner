    // 根据日期生成伪随机数
    function seededRandom(seed) {
      let x = Math.sin(seed) * 10000;
      return x - Math.floor(x);
    }

    function getDateSeed() {
      const now = new Date();
      const jst = new Date(now.getTime() + (9 * 60 * 60 * 1000));
      return jst.getUTCFullYear() * 10000 + (jst.getUTCMonth() + 1) * 100 + jst.getUTCDate();
    }

    function getTodayStr() {
      const now = new Date();
      const jst = new Date(now.getTime() + (9 * 60 * 60 * 1000));
      const y = jst.getUTCFullYear();
      const m = String(jst.getUTCMonth() + 1).padStart(2, '0');
      const d = String(jst.getUTCDate()).padStart(2, '0');
      const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
      const w = weekdays[jst.getUTCDay()];
      return `${y}年${m}月${d}日（${w}）`;
    }

    function getDailyPick(offset = 0) {
      const seed = getDateSeed() + offset;
      return Math.floor(seededRandom(seed) * restaurants.length);
    }

    let rerollCount = 0;
    let currentPickIdx = 0;
    let map = null;
    let markers = [];
    let highlightMarker = null;

    function renderCard() {
      currentPickIdx = getDailyPick(rerollCount);
      const r = restaurants[currentPickIdx];
      saveToHistory(r.name);

      document.getElementById('cardContent').innerHTML = `
        <span class="category">${r.category}</span>
        <span class="area-tag">${r.area}周边</span>
        <h2>${r.name}</h2>
        <p class="address">${r.address}</p>
        <p class="description">${r.description}</p>
        <a class="map-link" href="${r.maps}" target="_blank" rel="noopener">[ Google Maps ]</a>
      `;

      document.getElementById('dateDisplay').textContent = getTodayStr();

      const hunger = 50 + Math.floor(seededRandom(getDateSeed() + rerollCount + 99) * 50);
      document.getElementById('hungerBar').style.width = hunger + '%';

      highlightOnMap(currentPickIdx);
    }

    function reroll() {
      rerollCount++;
      renderCard();
      const card = document.getElementById('mainCard');
      card.style.transform = 'scale(0.95)';
      card.style.opacity = '0.7';
      setTimeout(() => {
        card.style.transform = 'scale(1)';
        card.style.opacity = '1';
      }, 150);
    }

    function saveToHistory(name) {
      const today = getTodayStr();
      let history = JSON.parse(localStorage.getItem('dinnerHistory') || '[]');
      history = history.filter(h => h.date !== today);
      history.unshift({ date: today, name: name });
      history = history.slice(0, 7);
      localStorage.setItem('dinnerHistory', JSON.stringify(history));
    }

    function toggleHistory() {
      const section = document.getElementById('historySection');
      const btn = document.getElementById('historyBtn');
      if (section.style.display === 'none') {
        section.style.display = 'block';
        btn.classList.add('active');
        renderHistory();
      } else {
        section.style.display = 'none';
        btn.classList.remove('active');
      }
    }

    function renderHistory() {
      const history = JSON.parse(localStorage.getItem('dinnerHistory') || '[]');
      const list = document.getElementById('historyList');
      if (history.length === 0) {
        list.innerHTML = '<p style="text-align:center;color:#666;font-size:0.75rem;">暂无历史记录</p>';
        return;
      }
      list.innerHTML = history.map(h => `
        <div class="history-item">
          <span class="date">${h.date}</span>
          <span class="name">${h.name}</span>
        </div>
      `).join('');
    }

    function getCategories() {
      return [...new Set(restaurants.map(r => r.category))];
    }

    let activeFilter = null;

    function renderFilters() {
      const bar = document.getElementById('filterBar');
      const cats = getCategories();
      bar.innerHTML = `<button class="filter-btn active" onclick="filterBy(null, this)">全部</button>` +
        cats.map(c => `<button class="filter-btn" onclick="filterBy('${c}', this)">${c}</button>`).join('');
    }

    function filterBy(category, btn) {
      activeFilter = category;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderList();
    }

    function renderList() {
      const list = document.getElementById('restaurantList');
      const filtered = activeFilter
        ? restaurants.filter(r => r.category === activeFilter)
        : restaurants;

      document.getElementById('totalCount').textContent = filtered.length;

      list.innerHTML = filtered.map((r, i) => `
        <a href="${r.maps}" target="_blank" rel="noopener" style="text-decoration:none;color:inherit;">
          <div class="restaurant-item" onmouseenter="focusMarker(${restaurants.indexOf(r)})">
            <div class="info">
              <h4>${r.name}</h4>
              <span>${r.area} / ${r.address}</span>
            </div>
            <span class="tag">${r.category}</span>
          </div>
        </a>
      `).join('');
    }

    // === 地图 ===
    function createPixelIcon(color, size) {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      const px = Math.floor(size / 8);
      const cx = Math.floor(size / 2);
      const cy = Math.floor(size / 2);

      ctx.fillStyle = color;
      ctx.fillRect(cx - px, cy - px, px * 2, px * 2);
      ctx.fillRect(cx - px, cy - px * 3, px * 2, px * 2);
      ctx.fillRect(cx - px, cy + px, px * 2, px * 2);
      ctx.fillRect(cx - px * 3, cy - px, px * 2, px * 2);
      ctx.fillRect(cx + px, cy - px, px * 2, px * 2);

      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1;
      ctx.strokeRect(cx - px, cy - px, px * 2, px * 2);

      return L.icon({
        iconUrl: canvas.toDataURL(),
        iconSize: [size, size],
        iconAnchor: [size / 2, size / 2],
        popupAnchor: [0, -size / 2]
      });
    }

    function initMap() {
      map = L.map('mapContainer', {
        zoomControl: true,
        attributionControl: false
      }).setView([34.6085, 135.5195], 15);

      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap &copy; CARTO'
      }).addTo(map);

      const defaultIcon = createPixelIcon('#ff4444', 24);

      restaurants.forEach((r, i) => {
        const icon = defaultIcon;
        const marker = L.marker([r.lat, r.lng], { icon: icon }).addTo(map);

        marker.bindPopup(`
          <div class="popup-name">${r.name}</div>
          <div class="popup-cat">${r.category} / ${r.area}</div>
          <div style="color:#999;font-size:0.65rem;margin-top:2px;">${r.description}</div>
          <a class="popup-link" href="${r.maps}" target="_blank" rel="noopener">Google Maps >></a>
        `, { className: 'pixel-popup', maxWidth: 250 });

        markers.push(marker);
      });

      // 公司标记
      const companyIcon = createPixelIcon('#66ff66', 28);
      const companyMarker = L.marker([34.6092340, 135.5132900], { icon: companyIcon, zIndexOffset: 500 }).addTo(map);
      companyMarker.bindPopup(`
        <div class="popup-name">公司</div>
        <div style="color:#999;font-size:0.65rem;">住吉区長居東4-11-25 タケ＆ハルビル第1</div>
      `, { className: 'pixel-popup' });

      // 显示所有标记的范围
      const allMarkers = [...markers, companyMarker];
      const group = new L.featureGroup(allMarkers);
      map.fitBounds(group.getBounds().pad(0.1));
    }

    function highlightOnMap(idx) {
      if (!map) return;
      const r = restaurants[idx];

      if (highlightMarker) {
        map.removeLayer(highlightMarker);
      }

      const goldIcon = createPixelIcon('#ffcc00', 32);
      highlightMarker = L.marker([r.lat, r.lng], { icon: goldIcon, zIndexOffset: 1000 }).addTo(map);
      highlightMarker.bindPopup(`
        <div class="popup-name">今日推荐 >> ${r.name}</div>
        <div class="popup-cat">${r.category} / ${r.area}</div>
        <div style="color:#999;font-size:0.65rem;margin-top:2px;">${r.description}</div>
        <a class="popup-link" href="${r.maps}" target="_blank" rel="noopener">Google Maps >></a>
      `, { className: 'pixel-popup', maxWidth: 250 }).openPopup();
    }

    // 鼠标悬停列表项时在地图上显示对应的popup
    function focusMarker(idx) {
      if (!map || !markers[idx]) return;
      markers[idx].openPopup();
      map.setView([restaurants[idx].lat, restaurants[idx].lng], 16, { animate: true });
    }

    // 初始化
    renderCard();
    renderFilters();
    renderList();
    initMap();
  </script>
