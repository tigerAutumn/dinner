    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {

      background: #0f0f23;

      min-height: 100vh;
      image-rendering: pixelated;
    }

    .pixel-border {
      border: 4px solid;
      box-shadow:
        4px 0 0 0 #555,
        -4px 0 0 0 #555,
        0 4px 0 0 #555,
        0 -4px 0 0 #555,
        4px 4px 0 0 #333,
        -4px -4px 0 0 #777,
        4px -4px 0 0 #555,
        -4px 4px 0 0 #555;
      border-color: #555;
    }

    /* 主布局：电脑端左右分栏 */
    .main-layout {
      display: flex;
      flex-direction: column;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1rem;
      gap: 1.5rem;
    }

    @media (min-width: 900px) {
      .main-layout {
        flex-direction: row;
        align-items: stretch;
        height: calc(100vh - 6rem);
      }
      .left-panel {
        flex: 0 0 400px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .left-panel .list-section {
        flex: 1 0 0;
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
      }
      .left-panel .list-section h3 {
        flex-shrink: 0;
      }
      .left-panel .list-section .filter-bar {
        flex-shrink: 0;
      }
      .left-panel .restaurant-list-grid {
        flex: 1 1 0;
        overflow-y: auto;
        min-height: 0;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      .left-panel .restaurant-list-grid::-webkit-scrollbar {
        display: none;
      }
      .right-panel {
        flex: 1;
        min-width: 0;
        height: 100%;
      }
    }

    .top-spacer {
      height: 2rem;
    }

    /* 地图区域 */
    .map-section {
      width: 100%;
    }

    #mapContainer {
      width: 100%;
      height: 50vh;
      min-height: 300px;
      border: 3px solid #555;
      background: #1a1a2e;
    }

    @media (min-width: 900px) {
      .right-panel .map-section {
        height: 100%;
      }
      #mapContainer {
        height: calc(100% - 2rem);
        min-height: 400px;
      }
    }

    .leaflet-container {
      font-family: 'DotGothic16', monospace;
      background: #1a1a2e;
    }

    .pixel-popup .leaflet-popup-content-wrapper {
      background: #1a1a2e;
      color: #cccccc;
      border: 3px solid var(--popup-color, #ffcc00);
      border-radius: 0;
      font-family: 'DotGothic16', monospace;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.5);
    }

    .pixel-popup .leaflet-popup-tip { background: var(--popup-color, #ffcc00); }

    .pixel-popup .leaflet-popup-content {
      margin: 8px 12px;
      font-size: 0.75rem;
      line-height: 1.6;
    }

    .pixel-popup .popup-name {
      color: var(--popup-color, #ffcc00);
      font-size: 0.85rem;
      margin-bottom: 4px;
    }

    .pixel-popup .popup-cat { color: #ff6666; font-size: 0.7rem; }

    .pixel-popup .popup-link {
      display: inline-block;
      margin-top: 6px;
      color: #ffffff;
      font-size: 0.7rem;
      text-decoration: none;
      border-bottom: 1px dashed #ffffff;
    }

    .pixel-popup .popup-link:hover { color: #ffffff; }

    .pixel-popup .leaflet-popup-close-button {
      color: #ff6666;
      font-size: 18px;
    }

    .list-section {
      width: 100%;
      margin: 0 0 2rem;
    }

    .list-section h3 {
      font-size: 0.85rem;
      color: #ff6666;
      margin-bottom: 0.8rem;
      text-align: center;
    }

    .list-section h3::before { content: "> "; color: #ff6666; }

    .filter-bar {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 1rem;
    }

    .filter-btn {
      background: transparent;
      color: #b4afa4;
      border: 2px solid #4a4640;
      padding: 0.2rem 0.5rem;
      cursor: pointer;
      font-size: 0.65rem;
      font-family: 'DotGothic16', monospace;
      transition: all 0.1s;
    }

    .filter-btn:hover, .filter-btn.active {
      border-color: #ff6666;
      color: #ff6666;
    }

    .restaurant-list-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.4rem;
      align-content: start;
    }

    .restaurant-item {
      background: #1a1a2e;
      border: 2px solid #333;
      padding: 0.8rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: all 0.1s;
    }

    .restaurant-item:hover {
      border-color: var(--rating-color, #ffcc00);
    }

    .restaurant-item.closed-today {
      opacity: 0.4;
    }

    .restaurant-item.today-pick {
      border-color: #ff66aa;
      box-shadow: 0 0 12px rgba(255, 102, 170, 0.55);
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .today-pick-badge {
      font-size: 0.8rem;
      color: #ff66aa;
      margin-left: 0.4rem;
      font-weight: bold;
      letter-spacing: 0.05em;
      animation: blink 1s ease-in-out infinite;
    }

    .restaurant-item .info h4 {
      font-size: 0.8rem;
      margin-bottom: 0.2rem;
      color: var(--rating-color, #ffffff);
    }

    .restaurant-item .info span {
      font-size: 0.6rem;
      color: #b4afa4;
    }

    .restaurant-item .tag {
      font-size: 0.55rem;
      color: #ff6666;
      border: 1px solid #ff6666;
      padding: 0.15rem 0.4rem;
      white-space: nowrap;
    }

    @media (max-width: 899px) {
      .top-spacer { height: 0.5rem; }

      .main-layout {
        gap: 0.2rem;
        padding: 0 0.5rem;

      .list-section { margin: 0 0 0.3rem; }
      .list-section h3 { font-size: 0.8rem; margin-bottom: 0.5rem; }

      .filter-bar { margin-bottom: 0.6rem; }

      .restaurant-list-grid {
        display: flex;
        overflow-x: auto;
        overflow-y: hidden;
        gap: 0.5rem;
        padding-bottom: 0.5rem;
        scroll-snap-type: x mandatory;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      .restaurant-list-grid::-webkit-scrollbar { display: none; }

      .restaurant-item {
        flex: 0 0 calc(100vw - 1rem);
        scroll-snap-align: start;
        padding: 0.6rem 0.6rem;
      }
      .restaurant-item .info h4 { font-size: 0.7rem; margin-bottom: 0; }
      .restaurant-item .info span { font-size: 0.55rem; }
      .restaurant-item .tag { font-size: 0.5rem; padding: 0.1rem 0.3rem; }

      #mapContainer {
        height: 63vh;
        min-height: 330px;
      }

      .map-section { padding-bottom: 0.3rem; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }


    body::after {
      content: '';
      position: fixed;

        transparent,
        transparent 2px,
        rgba(0,0,0,0.05) 2px,

      z-index: 9999;

    ::-webkit-scrollbar-track { background: #0f0f23; }

  </style>

        hours: "11:00-14:00/17:00-20:00", closed: [4],
        maps: "https://maps.app.goo.gl/zStFD2RLQ9n6yuzn9",
        rating: 3.14,
        lat: 34.59830, lng: 135.52168
      },
      // ============ 長居東2丁目 ============
      {
        name: "デニーズ 長居公園店", category: "定食・盖饭",
        address: "住吉区長居東2-2-23",
        description: "24小时营业的家庭餐厅。菜单丰富，深夜也可利用。",
        hours: "6:00-24:00", closed: [],
        maps: "https://maps.app.goo.gl/81ePCQbM4KeTgqUx7",
        rating: 3.07,
        lat: 34.60924, lng: 135.51765
      },
      {
        name: "マクドナルド 長居公園通り店", category: "快餐",
        address: "住吉区長居東2-1-32",
        description: "长居公园通沿线的24小时麦当劳。有得来速。",
        hours: "24時間（金曜 5:00-24:00）", closed: [],
        maps: "https://maps.app.goo.gl/MFTZBiRTiXarnFWZ8",
        rating: 3.04,
        lat: 34.60924, lng: 135.51988
      }
    ];

    // 根据日期生成伪随机数
    function seededRandom(seed) {
      let x = Math.sin(seed) * 10000;
      return x - Math.floor(x);
    }

    function getDateSeed() {
      const now = new Date();
      const jst = new Date(now.getTime() + (9 * 60 * 60 * 1000));
      return jst.getUTCFullYear() * 10000 + (jst.getUTCMonth() + 1) * 100 + jst.getUTCDate();
    }

    function getJST() {
      const now = new Date();
      return new Date(now.getTime() + (9 * 60 * 60 * 1000));
    }

    function getDailyPick() {
      const seed = getDateSeed();
      const jst = getJST();
      const isSunday = jst.getUTCDay() === 0;
      // 周日和非周日使用不同种子，推荐不同的店
      const finalSeed = isSunday ? seed + 77777 : seed;
      // 所有人看到同一个推荐（纯按日期随机），跳过定休日
      for (let offset = 0; offset < restaurants.length; offset++) {
        const idx = Math.floor(seededRandom(finalSeed + offset) * restaurants.length);
        if (!isClosedToday(restaurants[idx])) {
          return idx;
        }
      }
      return Math.floor(seededRandom(finalSeed) * restaurants.length);
    }

    let currentPickIdx = 0;
    let map = null;
    let markers = [];
    let highlightMarker = null;

    // 判断今天是否定休
    function isClosedToday(r) {
      const now = new Date();
      const jst = new Date(now.getTime() + (9 * 60 * 60 * 1000));
      const day = jst.getUTCDay(); // 0=日 1=月 2=火 3=水 4=木 5=金 6=土
      return r.closed && r.closed.includes(day);
    }

    function getClosedText(r) {
      if ((!r.closed || r.closed.length === 0) && !r.closedNote) return '';
      const dayNames = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
      let parts = [];
      if (r.closed && r.closed.length > 0) {
        parts.push(r.closed.map(d => dayNames[d]).join('・'));
      }
      if (r.closedNote) parts.push(r.closedNote);
      return parts.join(' / ');
    }

    // RPG装备等级评分系统
    // 传说~3% / 史诗~5% / 稀有~20% / 优秀~30% / 普通~40%
    function getRatingInfo(rating) {
      if (rating <= 0) return { label: '? 未鉴定', color: '#ffcc00', bg: '#2a2a00' };
      if (rating >= 3.65) return { label: '传说', color: '#ff8800', bg: '#3d2200' };
      if (rating >= 3.45) return { label: '史诗', color: '#cc44ff', bg: '#2a0033' };
      if (rating >= 3.35) return { label: '稀有', color: '#4488ff', bg: '#001a3d' };
      if (rating >= 3.15) return { label: '优秀', color: '#44ff44', bg: '#003300' };
      if (rating >= 3.00) return { label: '普通', color: '#aaaaaa', bg: '#222222' };
      return { label: '? 未鉴定', color: '#ffcc00', bg: '#2a2a00' };
    }

    const emojiMap = {
      '拉面': '🍜', '咖喱': '🍛', '定食・盖饭': '🍱',
      '中餐': '🥟', '快餐': '🍔', '烤肉': '🥩',
      '章鱼烧': '🐙', '西餐': '🍽️', '大阪烧': '🥞',
      '印度料理': '🫓', '乌冬・荞麦': '🍝', '炸猪排': '🍖',
      '寿司': '🍣', '越南料理': '🍲', '韩国料理': '🥘',
      '炸鸡': '🍗',
      '东南亚料理': '🥥',
      '烤鸡串': '🍢',
      '法式料理': '🇫🇷',
    };

    // 把emoji画到小Canvas再放大 → 像素化效果
    function getCategoryEmoji(category) {
      return emojiMap[category] || '🍴';
    }

    function getCategories() {
      return [...new Set(restaurants.map(r => r.category))];
    }

    let activeFilter = null;

    function renderFilters() {
      const bar = document.getElementById('filterBar');
      const cats = getCategories();
      bar.innerHTML = `<button class="filter-btn active" onclick="filterBy(null, this)">全部</button>` +
        cats.map(c => `<button class="filter-btn" onclick="filterBy('${c}', this)">${c}</button>`).join('');
    }

    function filterBy(category, btn) {
      activeFilter = category;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderList();
    }

    function renderList() {
      const list = document.getElementById('restaurantList');
      const filtered = (activeFilter
        ? restaurants.filter(r => r.category === activeFilter)
        : [...restaurants]
      ).sort((a, b) => b.rating - a.rating);

      // 今日推荐置顶（仅在过滤后仍可见时）
      const pickRestaurant = restaurants[currentPickIdx];
      const pickIdxInFiltered = filtered.indexOf(pickRestaurant);
      if (pickIdxInFiltered > 0) {
        filtered.splice(pickIdxInFiltered, 1);
        filtered.unshift(pickRestaurant);
      }

      document.getElementById('totalCount').textContent = filtered.length;

      list.innerHTML = filtered.map((r, i) => {
        const ri = getRatingInfo(r.rating);
        const closed = isClosedToday(r);
        const emoji = getCategoryEmoji(r.category);
        const isPick = restaurants.indexOf(r) === currentPickIdx;
        return `
          <div class="restaurant-item${closed ? ' closed-today' : ''}${isPick ? ' today-pick' : ''}" style="--rating-color:${ri.color};" onclick="focusMarker(${restaurants.indexOf(r)})">
            <span style="font-size:1.2rem;flex-shrink:0;margin-right:0.5rem;">${emoji}</span>
            <div class="info" style="flex:1;min-width:0;">
              <h4 style="color:${closed ? '#555' : ri.color};">${r.name}${closed ? ' <span style="color:#ff4444;font-size:0.6rem;">定休</span>' : ''}${isPick ? ' <span class="today-pick-badge">今日推荐</span>' : ''}</h4>
              <span>${r.hours}${getClosedText(r) ? ' | 休 ' + getClosedText(r) : ''}</span>
            </div>
            <div style="text-align:right;">
              <span class="tag" style="color:${closed ? '#555' : ri.color};border-color:${closed ? '#333' : ri.color};">${r.rating > 0 ? ri.label + ' ' + r.rating : ri.label}</span>
              <span class="tag" style="margin-top:4px;display:block;${closed ? 'color:#555;border-color:#333;' : ''}">${r.category}</span>
            </div>
          </div>`;
      }).join('');
    }

    // === 地图 ===
    // 餐馆标记：小圆形（紧凑，减少重叠）
    function createCircleIcon(color, size) {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      const cx = size / 2;
      const cy = size / 2;
      const r = size * 0.35;

      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      return L.icon({
        iconUrl: canvas.toDataURL(),
        iconSize: [size, size],
        iconAnchor: [size / 2, size / 2],
        popupAnchor: [0, -size / 2]
      });
    }

    // 地铁站标记：方块
    function createSquareIcon(color, size, label = 'M') {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      const pad = size * 0.2;

      ctx.fillStyle = color;
      ctx.fillRect(pad, pad, size - pad * 2, size - pad * 2);
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(pad, pad, size - pad * 2, size - pad * 2);

      ctx.fillStyle = '#fff';
      ctx.font = `bold ${Math.floor(size * 0.4)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(label, size / 2, size / 2);

      return L.icon({
        iconUrl: canvas.toDataURL(),
        iconSize: [size, size],
        iconAnchor: [size / 2, size / 2],
        popupAnchor: [0, -size / 2]
      });
    }

    // 推荐标记：星形（醒目）
    function createStarIcon(color, size) {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      const cx = size / 2;
      const cy = size / 2;
      const outerR = size * 0.45;
      const innerR = size * 0.2;
      const spikes = 5;

      ctx.beginPath();
      for (let i = 0; i < spikes * 2; i++) {
        const r = i % 2 === 0 ? outerR : innerR;
        const angle = (Math.PI * i / spikes) - Math.PI / 2;
        const x = cx + Math.cos(angle) * r;
        const y = cy + Math.sin(angle) * r;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      return L.icon({
        iconUrl: canvas.toDataURL(),
        iconSize: [size, size],
        iconAnchor: [size / 2, size / 2],
        popupAnchor: [0, -size / 2]
      });
    }

    function initMap() {
      map = L.map('mapContainer', {
        zoomControl: true,
        attributionControl: false
      }).setView([34.6085, 135.5195], 15);

      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap &copy; CARTO'
      }).addTo(map);

      const closedIcon = createCircleIcon('#555555', 16);

      restaurants.forEach((r, i) => {
        const closed = isClosedToday(r);
        const ratingColor = getRatingInfo(r.rating).color;
        const icon = closed ? closedIcon : createCircleIcon(ratingColor, 16);
        const marker = L.marker([r.lat, r.lng], { icon: icon }).addTo(map);

        marker.bindPopup(`
          <div class="popup-name">${getCategoryEmoji(r.category)} ${r.name}${closed ? ' <span style="color:#ff4444;font-size:0.65rem;">定休</span>' : ''}</div>
          <div class="popup-cat" style="color:${ratingColor};">${r.rating > 0 ? getRatingInfo(r.rating).label + ' ' + r.rating : getRatingInfo(r.rating).label} | ${r.category}</div>
          <div style="color:#c4bfb4;font-size:0.65rem;margin-top:2px;">${r.description}</div>
          <a class="popup-link" href="${r.maps}" target="_blank" rel="noopener">Google Maps >></a>
        `, { className: 'pixel-popup', maxWidth: 250 });
        marker.on('popupopen', () => {
          marker.getPopup().getElement().style.setProperty('--popup-color', ratingColor);
        });

        markers.push(marker);
      });

      // 车站标记（青色方块带M标识）
      const poiIcon = createSquareIcon('#00cccc', 26);
      const nagaiMarker = L.marker([34.6092340, 135.5132900], { icon: poiIcon, zIndexOffset: 500 }).addTo(map);
      nagaiMarker.bindPopup(`
        <div class="popup-name">长居站</div>
        <div style="color:#999;font-size:0.65rem;">Osaka Metro 御堂筋線 長居駅</div>
      `, { className: 'pixel-popup' });

      // 我孙子站标记
      const abikoMarker = L.marker([34.6000, 135.5133], { icon: poiIcon, zIndexOffset: 500 }).addTo(map);
      abikoMarker.bindPopup(`
        <div class="popup-name">我孙子站</div>
        <div style="color:#999;font-size:0.65rem;">Osaka Metro 御堂筋線 あびこ駅</div>
      `, { className: 'pixel-popup' });

      // 自宅标记（青色方块带H标识）
      const homeIcon = createSquareIcon('#00cccc', 26, 'H');
      const homeMarker = L.marker([34.604202, 135.522018], { icon: homeIcon, zIndexOffset: 500 }).addTo(map);
      homeMarker.bindPopup(`
        <div class="popup-name">自宅</div>
        <div style="color:#999;font-size:0.65rem;">UR サンヴァリエ東長居 16号棟</div>
      `, { className: 'pixel-popup' });

      // 显示所有标记的范围
      const allMarkers = [...markers, nagaiMarker, abikoMarker, homeMarker];
      const group = new L.featureGroup(allMarkers);
      map.fitBounds(group.getBounds().pad(0.02));
    }

    function highlightOnMap(idx) {
      if (!map) return;
      const r = restaurants[idx];

      if (highlightMarker) {
        map.removeLayer(highlightMarker);
      }

      const ratingColor = getRatingInfo(r.rating).color;
      const goldIcon = createStarIcon('#ff66aa', 36);
      highlightMarker = L.marker([r.lat, r.lng], { icon: goldIcon, zIndexOffset: 1000 }).addTo(map);
      highlightMarker.bindPopup(`
        <div class="popup-name">${getCategoryEmoji(r.category)} 今日推荐 >> ${r.name}</div>
        <div class="popup-cat" style="color:${ratingColor};">${r.rating > 0 ? getRatingInfo(r.rating).label + ' ' + r.rating : getRatingInfo(r.rating).label} | ${r.category}</div>
        <div style="color:#c4bfb4;font-size:0.65rem;margin-top:2px;">${r.description}</div>
        <a class="popup-link" href="${r.maps}" target="_blank" rel="noopener">Google Maps >></a>
      `, { className: 'pixel-popup', maxWidth: 250 });
      highlightMarker.on('popupopen', () => {
        highlightMarker.getPopup().getElement().style.setProperty('--popup-color', ratingColor);
      });
      highlightMarker.openPopup();
    }

    // 鼠标悬停列表项时在地图上显示对应的popup
    function focusMarker(idx) {
      if (!map || !markers[idx]) return;
      markers[idx].openPopup();
      map.setView([restaurants[idx].lat, restaurants[idx].lng], 16, { animate: true });
    }

    // 初始化
    currentPickIdx = getDailyPick();
    renderFilters();
    renderList();
    initMap();
    highlightOnMap(currentPickIdx);

    // PWA: 注册 service worker（仅 https 或 localhost 生效）
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
