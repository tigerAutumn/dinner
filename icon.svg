<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" shape-rendering="crispEdges">
  <rect width="512" height="512" fill="#0f0f23"/>

  <!-- steam (pixel bars) -->
  <g fill="#888" opacity="0.85">
    <rect x="176" y="112" width="24" height="64"/>
    <rect x="160" y="144" width="24" height="32"/>
    <rect x="248" y="80"  width="24" height="96"/>
    <rect x="232" y="112" width="24" height="32"/>
    <rect x="320" y="112" width="24" height="64"/>
    <rect x="336" y="144" width="24" height="32"/>
  </g>

  <!-- noodle clumps poking above rim -->
  <g fill="#f4e4a8">
    <rect x="120" y="216" width="48" height="40"/>
    <rect x="200" y="200" width="48" height="56"/>
    <rect x="272" y="208" width="48" height="48"/>
    <rect x="344" y="216" width="48" height="40"/>
  </g>
  <!-- noodle dark accent -->
  <g fill="#c4a878">
    <rect x="120" y="248" width="48" height="8"/>
    <rect x="200" y="248" width="48" height="8"/>
    <rect x="272" y="248" width="48" height="8"/>
    <rect x="344" y="248" width="48" height="8"/>
  </g>

  <!-- bowl rim (red) -->
  <rect x="72" y="256" width="368" height="40" fill="#ff6666"/>
  <!-- rim highlight -->
  <rect x="72" y="256" width="368" height="8" fill="#ffaaaa"/>
  <!-- rim shadow -->
  <rect x="72" y="288" width="368" height="8" fill="#cc4444"/>

  <!-- bowl body (yellow trapezoid, drawn as pixel layers) -->
  <rect x="80"  y="296" width="352" height="32" fill="#ffcc00"/>
  <rect x="88"  y="328" width="336" height="32" fill="#ffcc00"/>
  <rect x="96"  y="360" width="320" height="32" fill="#ffcc00"/>
  <rect x="104" y="392" width="304" height="32" fill="#ffcc00"/>
  <rect x="120" y="424" width="272" height="16" fill="#cc9900"/>

  <!-- bowl side highlight (left) -->
  <rect x="80"  y="296" width="8" height="32"  fill="#ffe066"/>
  <rect x="88"  y="328" width="8" height="32"  fill="#ffe066"/>
  <rect x="96"  y="360" width="8" height="32"  fill="#ffe066"/>
  <rect x="104" y="392" width="8" height="32"  fill="#ffe066"/>

  <!-- inner bowl shadow (top edge) -->
  <rect x="80" y="296" width="352" height="12" fill="#000" opacity="0.35"/>
</svg>
